<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'MS Gothic',monospace;background:#ddd;font-size:12px;}
button{cursor:pointer;font-family:inherit;touch-action:manipulation;border:1px solid #888;background:#eee;color:#333;border-radius:3px;}
#nav{display:flex;gap:3px;padding:4px 5px;background:#2a1a0a;position:fixed;top:0;left:0;right:0;z-index:100;}
#nav button{padding:5px 10px;font-size:11px;background:#4a3a2a;color:#ccc;border:1px solid #5a4a3a;}
#nav button.on{background:#fff9f0;color:#2a1a0a;font-weight:bold;}
.nb{margin-left:auto;background:#1a5a1a !important;color:#fff !important;border-color:#1a5a1a !important;}
#page-body{margin-top:36px;}
#sheet-wrap{background:#fff;border-bottom:2px solid #2a1a0a;padding:3px;}
.sh-title{text-align:center;font-size:11px;font-weight:bold;letter-spacing:1px;margin-bottom:2px;}
.sh-info{font-size:8px;color:#555;display:flex;justify-content:space-between;margin-bottom:2px;}
.sh-teams{display:grid;grid-template-columns:1fr 44px 1fr;border:1px solid #000;font-size:12px;}
.sh-tx{padding:3px 4px;font-weight:bold;color:#004400;border-right:1px solid #000;}
.sh-tc{font-size:7px;display:flex;align-items:center;justify-content:center;border-right:1px solid #000;color:#666;}
.sh-ty{padding:3px 4px;font-weight:bold;color:#660000;}
.sh-players{display:grid;grid-template-columns:1fr 44px 1fr;border:1px solid #000;border-top:none;font-size:10px;}
.sh-px{padding:2px 4px;color:#004400;border-right:1px solid #000;}
.sh-pc{border-right:1px solid #000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;}
.sh-py{padding:2px 4px;color:#660000;}
.sh-gc{font-size:11px;font-weight:bold;color:#2a1a0a;line-height:1.2;text-align:center;}
.sh-gl{font-size:7px;color:#888;text-align:center;line-height:1;}
.gb{border:1px solid #000;border-top:none;}
.gb.cur{background:#fffff4;}
.gb-head{display:grid;grid-template-columns:1fr 44px 1fr;border-bottom:1px solid #ccc;background:#f5f0e0;min-height:20px;}
.gh-left{display:flex;align-items:center;padding:1px 3px;gap:2px;border-right:1px solid #000;flex-wrap:wrap;}
.gh-sc{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;border-right:1px solid #000;}
.gh-right{display:flex;align-items:center;justify-content:flex-end;padding:1px 3px;gap:2px;flex-wrap:wrap;}
.gnum{font-size:8px;font-weight:bold;color:#555;margin-right:2px;}
.sd{width:11px;height:11px;background:#cc9900;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:bold;color:#fff;flex-shrink:0;}
.sr{font-size:7px;color:#ccc;width:11px;text-align:center;flex-shrink:0;}
.fbx{font-size:7px;background:#e0f0e0;border:1px solid #004400;color:#004400;padding:0 3px;border-radius:2px;font-weight:bold;white-space:nowrap;}
.fby{font-size:7px;background:#f0e0e0;border:1px solid #660000;color:#660000;padding:0 3px;border-radius:2px;font-weight:bold;white-space:nowrap;}
.gb-pts{display:grid;grid-template-columns:1fr 44px 1fr;}
.pts-col{display:flex;flex-direction:column;}
.pts-col:first-child{border-right:1px solid #000;}
.pts-ctr{border-right:1px solid #000;}
.ptrow{display:flex;}
.pc{flex:1;height:18px;border-right:1px dotted #ddd;border-bottom:1px dotted #ddd;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.pc:last-child{border-right:none;}
.pc.won{background:#c8ecc8;}.pc.lost{background:#ecc8c8;}
.pc .pm{font-size:10px;font-weight:bold;line-height:1;}
.pc .pp{font-size:6px;color:#333;font-weight:bold;line-height:1;}
.pc .pr{font-size:5px;color:#fff;background:#555;padding:0 1px;border-radius:1px;line-height:1.2;}
.sh-tot{display:grid;grid-template-columns:1fr 44px 1fr;border:1px solid #000;border-top:none;background:#f0ece0;font-size:9px;font-weight:bold;}
.st-x{padding:2px 3px;color:#004400;border-right:1px solid #000;}
.st-c{display:flex;align-items:center;justify-content:center;font-size:8px;border-right:1px solid #000;padding:1px;text-align:center;}
.st-y{padding:2px 3px;color:#660000;}
#status{background:#2a1a0a;color:#ffe;font-size:10px;padding:3px 6px;display:none;flex-wrap:wrap;gap:4px;align-items:center;}
.sbadge{background:#ffe066;color:#554400;font-weight:bold;padding:1px 6px;border-radius:3px;font-size:10px;}
.pbadge{background:#fff;color:#2a1a0a;font-weight:bold;padding:1px 6px;border-radius:3px;font-size:10px;}
#input-wrap{background:#f0ece4;padding:5px;display:none;}
.iblock{background:#fff;border:1px solid #ddd;padding:6px;margin-bottom:4px;border-radius:4px;}
.ilabel{font-size:9px;color:#888;font-weight:bold;margin-bottom:3px;}
.brow{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px;align-items:center;}
.brow span{font-size:11px;color:#555;min-width:56px;white-space:nowrap;}
/* multi-select形陣形ボタン */
.sel-btn{padding:10px 6px;font-size:12px;border:1px solid #aaa;background:#f0f0f0;color:#555;border-radius:4px;white-space:normal;word-break:keep-all;min-height:44px;box-sizing:border-box;}
.sel-btn.sm{padding:5px 8px;font-size:10px;white-space:nowrap;width:68px;text-align:center;}
.sel-btn.on{background:#2a6a9a;color:#fff;border-color:#1a4a7a;font-weight:bold;}
.sel-btn.on-green{background:#1a6a1a;color:#fff;border-color:#0a4a0a;font-weight:bold;}
.sel-btn.on-red{background:#8a1a1a;color:#fff;border-color:#5a0a0a;font-weight:bold;}
.sel-btn.on-orange{background:#8a5a0a;color:#fff;border-color:#5a3a0a;font-weight:bold;}
.sub-row{display:none;border-radius:3px;padding:4px 6px;margin-bottom:3px;}
.sub-row.active{display:block;}
.sub-row.green{background:#f0f8f0;border:1px solid #aaddaa;}
.sub-row.orange{background:#fff8e0;border:1px solid #ddbb44;}
.sub-row.red{background:#fff0f0;border:1px solid #ffaaaa;}
.sub-lbl{font-size:11px;font-weight:bold;min-width:60px;}
.sel-status{font-size:10px;background:#fff9e0;border:1px solid #ccaa44;padding:3px 6px;border-radius:3px;margin-bottom:4px;color:#554400;}
.miss-note{font-size:9px;background:#fff0f0;border:1px solid #cc4444;padding:4px 6px;border-radius:3px;margin-bottom:4px;display:none;color:#880000;}
#srv-ui{background:#fff8e8;border:1px solid #e8c050;border-radius:4px;padding:5px 6px;margin-bottom:4px;display:none;}
#srv-ui .srv-lbl{font-size:9px;font-weight:bold;color:#7a5a00;margin-bottom:3px;}

#rsn-ui{display:none;}
#sig{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:4px;}
.tbox{border:2px solid #ccc;border-radius:4px;padding:5px;}
.tbox.xb{border-color:#1a5a1a;background:#f0fff4;}
.tbox.yb{border-color:#7a1a1a;background:#fff4f0;}
.ttl{font-size:10px;font-weight:bold;margin-bottom:4px;text-align:center;}
.ttl.x{color:#004400;}.ttl.y{color:#660000;}
.pb2{width:100%;padding:14px 4px;font-size:14px;font-weight:bold;border:1px solid #888;cursor:pointer;margin-bottom:4px;text-align:center;border-radius:4px;}
.pb2:active{filter:brightness(0.85);}
.pb2:disabled{background:#ddd !important;color:#aaa !important;border-color:#ccc !important;cursor:not-allowed;}
#act-row{display:flex;gap:4px;padding-bottom:5px;}
#act-row button{flex:1;padding:8px 4px;font-size:11px;}
#tab-analysis,#tab-history{display:none;background:#f0ece4;padding:5px;}
.anwrap{background:#fff;border:1px solid #ccc;padding:7px;border-radius:4px;}
.antitle{font-size:11px;font-weight:bold;border-bottom:2px solid #2a1a0a;padding-bottom:3px;margin-bottom:7px;color:#2a1a0a;}
.ansec{margin-bottom:10px;}
.ansh{font-size:10px;font-weight:bold;color:#fff;background:#2a1a0a;padding:2px 6px;margin-bottom:4px;border-radius:2px;}
.scards{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:5px;}
.sc{text-align:center;border:1px solid #ccc;padding:4px 2px;border-radius:2px;}
.sc .sl{font-size:8px;color:#666;}.sc .sv{font-size:15px;font-weight:bold;}.sc .ss{font-size:8px;color:#888;}
.sc.x{border-top:3px solid #1a5a1a;}.sc.y{border-top:3px solid #7a1a1a;}.sc.n{border-top:3px solid #555;}
.stbl{width:100%;border-collapse:collapse;font-size:9px;margin-bottom:3px;}
.stbl th{background:#f0ece0;padding:2px 3px;text-align:left;font-size:8px;border:1px solid #ddd;}
.stbl td{padding:2px 3px;border:1px solid #ddd;vertical-align:middle;}
.stbl tr:nth-child(even){background:#fafafa;}
.dbar{display:flex;height:8px;background:#eee;border-radius:2px;overflow:hidden;}
.bx{height:100%;background:#1a5a1a;min-width:0;}.by{height:100%;background:#7a1a1a;min-width:0;}
/* 履歴 */
.folder-group{background:#fff;border:1px solid #ccc;border-radius:4px;margin-bottom:6px;overflow:hidden;}
.folder-hd{display:flex;align-items:center;gap:4px;padding:6px 8px;background:#f5f0e0;border-bottom:1px solid #ddd;cursor:pointer;font-size:10px;font-weight:bold;color:#2a1a0a;}
.folder-hd:hover{background:#ede8d8;}
.folder-hd .ficon{font-size:12px;}
.folder-hd .fname{flex:1;}
.folder-hd .fcnt{font-size:9px;color:#888;}
.folder-del{font-size:10px;padding:2px 6px;background:#c44;color:#fff;border:none;border-radius:2px;}
.folder-body{display:none;}
.folder-body.open{display:block;}
.hcard{background:#fff;border-bottom:1px solid #eee;border-left:3px solid #2a1a0a;padding:7px 8px;cursor:pointer;display:flex;align-items:center;gap:4px;}
.hcard:hover{background:#fafafa;}
.hcard-info{flex:1;}
.hcard-info h4{font-size:11px;font-weight:bold;margin-bottom:2px;}
.hcard-info p{font-size:9px;color:#555;}
.hcard-del{font-size:10px;padding:3px 7px;background:#c44;color:#fff;border:none;border-radius:2px;flex-shrink:0;}
.badge{background:#2a1a0a;color:#fff;font-size:10px;font-weight:bold;padding:1px 5px;margin-left:3px;border-radius:2px;}
.empty{text-align:center;padding:20px;color:#888;font-size:11px;}
/* モーダル */
#mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;overflow-y:auto;padding:10px;}
#mbox{background:#fff;border:2px solid #2a1a0a;padding:12px;max-width:400px;margin:0 auto;border-radius:4px;}
#mbox h3{font-size:12px;font-weight:bold;border-bottom:2px solid #2a1a0a;padding-bottom:3px;margin-bottom:8px;color:#2a1a0a;}
#mbox label{font-size:9px;color:#555;display:block;margin-bottom:1px;}
#mbox input,#mbox select{width:100%;border:1px solid #888;font-size:11px;font-family:inherit;padding:4px;margin-bottom:5px;background:#fff;border-radius:2px;}
.msec{background:#f8f8f8;border:1px solid #ddd;padding:7px;margin-bottom:7px;border-radius:3px;}
.msec h4{font-size:10px;font-weight:bold;margin-bottom:5px;}
.mg-btn{padding:5px 12px;font-size:11px;border:1px solid #aaa;background:#f0f0f0;color:#555;border-radius:3px;}
.mg-btn.on{background:#2a1a0a;color:#fff;font-weight:bold;}
.srv-btn{flex:1;padding:6px;font-size:11px;border:1px solid #aaa;background:#f0f0f0;color:#555;border-radius:3px;}
.srv-btn.on{background:#cc9900;color:#fff;font-weight:bold;}
/* フォルダ追加行 */
.folder-add-row{display:flex;gap:4px;margin-bottom:5px;}
.folder-add-row input{flex:1;border:1px solid #aaa;font-size:11px;font-family:inherit;padding:4px;border-radius:2px;}
.folder-add-row button{padding:4px 10px;font-size:11px;background:#1a5a1a;color:#fff;border:none;border-radius:2px;}
/* 印刷 */
@media print{
  #nav,#status,#input-wrap,#tab-history,.no-print{display:none!important;}
  #page-body{margin-top:0;}
  body{background:#fff;}
}
.print-btn{padding:5px 10px;font-size:11px;background:#335;color:#fff;border:none;border-radius:3px;}
.memo-tag-btn{padding:4px 8px;font-size:10px;border:1px solid #7a9aba;background:#e8f0fa;color:#3a5a8a;border-radius:12px;cursor:pointer;}
.memo-tag-btn:active{background:#3a5a8a;color:#fff;}
.memo-entry{padding:7px 9px;border-bottom:1px solid #eee;position:relative;}
.memo-entry:last-child{border-bottom:none;}
.memo-entry .me-time{font-size:8px;color:#aaa;margin-bottom:2px;}
.memo-entry .me-text{font-size:11px;color:#333;white-space:pre-wrap;line-height:1.6;word-break:break-all;}
.memo-entry .me-del{position:absolute;top:6px;right:6px;font-size:10px;background:none;border:1px solid #ddd;color:#aaa;border-radius:2px;padding:1px 5px;cursor:pointer;}
.memo-entry .me-del:hover{background:#fdd;border-color:#c44;color:#c44;}
</style>
</head>
<body>
<div id="nav">
  <span style="color:#ffe066;font-size:11px;font-weight:bold;letter-spacing:1px;padding:0 4px;align-self:center;">🎾 STAP</span>
  <button id="nav-record" class="on" onclick="showTab('record')">採点票</button>
  <button id="nav-analysis" onclick="showTab('analysis')">分析</button>
  <button id="nav-history" onclick="showTab('history')">履歴</button>
  <button class="nb" onclick="openModal()" style="padding:5px 10px;font-size:11px;">＋ 新規試合</button>
</div>
<div id="page-body">
  <div id="tab-record">
    <div id="no-msg" style="text-align:center;padding:40px;background:#fff;color:#888;font-size:11px;">
      🎾 STAP<br><br>
      <button onclick="openModal()" style="background:#2a1a0a;color:#fff;padding:10px 18px;font-size:13px;border-radius:4px;">＋ 新規試合を開始</button>
    </div>
    <div id="sheet-wrap" style="display:none;">
      <div class="sh-title">🎾 STAP　ソフトテニス ダブルス ジャッジペーパー</div>
      <div class="sh-info"><span id="si-l"></span><span id="si-r"></span></div>
      <div id="sh-body"></div>
    </div>
    <div id="status"><span class="sbadge" id="srv-b">サーブ：-</span><span class="pbadge" id="sc-b">-</span></div>
    <div id="input-wrap">
      <!-- 陣形選択（サーブUIの上） -->
      <div style="background:#f8f4ee;border-bottom:1px solid #ddd;padding:4px 5px;">
        <div style="display:flex;flex-wrap:nowrap;overflow-x:auto;gap:3px;align-items:center;">
          <span id="lfx" style="font-size:9px;color:#004400;white-space:nowrap;min-width:auto;">X:</span>
          <button class="sel-btn sm on-green" id="fx0" onclick="togF('fX','雁行',this)">雁行</button>
          <button class="sel-btn sm" id="fx1" onclick="togF('fX','並行',this)">並行</button>
          <button class="sel-btn sm" id="fx2" onclick="togF('fX','二枚後衛',this)">二枚後衛</button>
          <span style="margin:0 3px;color:#ccc;">|</span>
          <span id="lfy" style="font-size:9px;color:#660000;white-space:nowrap;min-width:auto;">Y:</span>
          <button class="sel-btn sm on-red" id="fy0" onclick="togF('fY','雁行',this)">雁行</button>
          <button class="sel-btn sm" id="fy1" onclick="togF('fY','並行',this)">並行</button>
          <button class="sel-btn sm" id="fy2" onclick="togF('fY','二枚後衛',this)">二枚後衛</button>
        </div>
      </div>
      <!-- サーブUI -->
      <div id="srv-ui">
        <div class="srv-lbl" id="srv-ui-lbl">🎾 ファーストサーブ</div>
        <div id="srv-player-info" style="font-size:10px;margin-bottom:4px;display:flex;gap:6px;flex-wrap:wrap;">
          <span id="srv-team-name" style="font-weight:bold;color:#2a1a0a;"></span>
          <span id="srv-player-name" style="color:#555;"></span>
        </div>
        <!-- ゲーム開始時サーバー選択（2ゲーム目以降） -->
        <div id="srv-gstart" style="display:none;margin-bottom:6px;background:#fffbe8;border:1px solid #e8c050;border-radius:3px;padding:5px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;">

<script>
var NUMS=['①','②','③','④','⑤','⑥','⑦','⑧','⑨'];
var FORMS=['雁行','並行','二枚後衛'];
// G.fX, G.fY は配列（multi-select）
var G={fX:['雁行'],fY:['雁行'],co:'クロス',rsn:'',fs:'X',fp:'A',mg:5,srv1:null,srv2:null,srvCo:'正クロス',srvType:'normal',srvType2:'normal'};
var matches=[],cur=null;
var folders=[]; // [{id, name}]

// localStorage読み込み
try{var _s=localStorage.getItem('stC8');if(_s)matches=JSON.parse(_s);}catch(e){}
try{var _f=localStorage.getItem('stF1');if(_f)folders=JSON.parse(_f);}catch(e){}

function persist(){
  try{localStorage.setItem('stC8',JSON.stringify(matches));}catch(e){}
  try{localStorage.setItem('stF1',JSON.stringify(folders));}catch(e){}
}
function winN(m){return Math.ceil(m.mg/2);}
function getSrv(m,g){return(g%2===0)?m.fs:(m.fs==='X'?'Y':'X');}
function tnX(m){return m.xname||'チームX';}
function tnY(m){return m.yname||'チームY';}
var LOSE_RSN=['DF','UE','RE','BVE','SME','バックアウト','サイドアウト','ネット'];
function isLose(rsn){return LOSE_RSN.indexOf(rsn)>=0;}
var RSN_LABEL={
  '':'通常','SA':'SAエース','RA':'リターンエース','DF':'DF','RE':'REレシーブミス','SM':'スマッシュ',
  'FH':'フォアストローク','BH':'バックストローク','カット':'カットストローク',

function isFinalGame(m,g){
  // ファイナルゲーム判定：奇数ゲーム数マッチの最終ゲーム（0-indexed）
  return g===m.mg-1&&m.mg%2===1;
}
function isGameOver(gx,gy,isFinal){
  if(isFinal){
    // 7点先取、6-6以降は2点差
    if(gx>=7&&gx-gy>=2)return'X';
    if(gy>=7&&gy-gx>=2)return'Y';
    // 6-6未満の7点先取
    if(gx===7&&gy<=5)return'X';
    if(gy===7&&gx<=5)return'Y';
    return null;
  } else {
    if(gx>=4&&gx-gy>=2)return'X';
    if(gy>=4&&gy-gx>=2)return'Y';
    if(gx===7||gy===7)return(gx>gy?'X':'Y');
    return null;
  }
}
function getSrvPlayer(m,gPts,gameNum){
  // ゲームごとの最初のサーバー（gFP配列）を使用
  if(!m.gFP)m.gFP=[];
  if(!m.gFPY)m.gFPY={};
  if(!isFinalGame(m,gameNum)){
    // 通常ゲーム：2ポイントごとに同チーム内A/B交代
    var sv=getSrv(m,gameNum);
    var gfp;
    if(sv==='X'){
      gfp=m.gFP[gameNum]!=null?m.gFP[gameNum]:m.fp;
    } else {
      gfp=m.gFPY[gameNum]!=null?m.gFPY[gameNum]:'A';
    }
    var cycle=Math.floor(gPts/2)%2;
    var base=(gfp==='A')?0:1;
    return(cycle===base%2)?'A':'B';
  } else {
    // ファイナルゲーム：2ポイントごとにX/Y交互にサーブ
    // gFPX: Xの最初のサーバー、gFPY: Yの最初のサーバー
    return getSrvPlayerFinal(m,gPts,gameNum);
  }
}
function getSrvTeamFinal(m,gPts){
  // ファイナル：2ポイントごとにX→Y→X→Y...
  // 最初のサーブチームはm.fsと同じ
  var cycle=Math.floor(gPts/2)%2;
  return cycle===0?m.fs:(m.fs==='X'?'Y':'X');
}
function getSrvPlayerFinal(m,gPts,gameNum){
  // ファイナル：サーブチームを特定し、そのチームの何回目かを計算
  if(!m.gFPY)m.gFPY={}; // Yチームのファイナル最初サーバー
  var cycle=Math.floor(gPts/2); // 0から始まる交代回数
  var srvTeam=cycle%2===0?m.fs:(m.fs==='X'?'Y':'X');
  // そのチームが何回目のサーブか（0-indexed）
  var teamTurn=Math.floor(cycle/2); // 0,1,2...→A,B,A,B...
  if(srvTeam==='X'){
    var xfp=m.gFP[gameNum]!=null?m.gFP[gameNum]:m.fp;
    return teamTurn%2===0?xfp:(xfp==='A'?'B':'A');
  } else {
    var yfp=m.gFPY[gameNum]!=null?m.gFPY[gameNum]:'A';
    return teamTurn%2===0?yfp:(yfp==='A'?'B':'A');
  }
}
function getSrvTeamForPt(m,gPts,gameNum){
  if(!isFinalGame(m,gameNum))return getSrv(m,gameNum);
  return getSrvTeamFinal(m,gPts);
}

      var btn=document.createElement('button');btn.className='sel-btn';
      btn.textContent='👤 '+pa[0]+'（'+pa[1]+'）から';
      (function(p){
        btn.onclick=function(){
          if(selTeam==='X') cur.gFP[g]=p;
          else cur.gFPY[g]=p;
          persist();
          gStartEl.style.display='none';
          firstRowEl.style.display='block';

          document.getElementById('srv-player-name').textContent='サーバー：'+srvName2+'（'+srvP2+'）';
        };
      })(pa[1]);
      btns.appendChild(btn);
    });

    document.getElementById('sub-str').classList.add('active');
  } else if(val==='_VOL'){
    G.rsn='';
    document.getElementById('sub-vol').classList.add('active');
  } else if(val==='_MISS'){
    G.rsn='';
    document.getElementById('sub-miss').classList.add('active');
    document.getElementById('miss-note').style.display='block';
    document.getElementById('miss-note').innerHTML='⚠️ ミスしたチームを押す → 相手の得点として記録';
  } else if(val==='SA'){
    G.rsn='SA';
    // SAは自動記録：現在のサーブ選手・チームで即得点
    if(cur&&!cur.done){
      var g=cur.curG;
      var gPts=filt(cur.points,function(p){return p.game===g;}).length;
      var svTeamSA=isFinalGame(cur,g)?getSrvTeamFinal(cur,gPts):getSrv(cur,g);
      var srvPSA=getSrvPlayer(cur,gPts,g);
      var srvPlayerKey=svTeamSA+srvPSA;
      recordPt(svTeamSA,srvPlayerKey);
    }
    return;
  } else if(val==='DF'){
    G.rsn='DF';
    document.getElementById('miss-note').style.display='block';
    document.getElementById('miss-note').innerHTML='⚠️ DFしたチームを押す → 相手の得点として記録';
  } else if(val==='RE'){
    G.rsn='RE';
    if(cur&&!cur.done){
      var g2=cur.curG;
      var gPts2=filt(cur.points,function(p){return p.game===g2;}).length;
      var svTeam2=isFinalGame(cur,g2)?getSrvTeamFinal(cur,gPts2):getSrv(cur,g2);
      var srvP2=getSrvPlayer(cur,gPts2,g2);
      var srvKey2=svTeam2+srvP2;
      var prevSrv2=filt(cur.points,function(p){return p.game===g2&&p.srvPlayer===srvKey2;}).length;
      var rcvTeam2=svTeam2==='X'?'Y':'X';
      var rcvP2=prevSrv2%2===0?'A':'B';
      recordPt(svTeam2,rcvTeam2+rcvP2);
    }
    return;
  } else if(val==='RA'){
    G.rsn='RA';
    if(cur&&!cur.done){
      var g3=cur.curG;
      var gPts3=filt(cur.points,function(p){return p.game===g3;}).length;
      var svTeam3=isFinalGame(cur,g3)?getSrvTeamFinal(cur,gPts3):getSrv(cur,g3);
      var srvP3=getSrvPlayer(cur,gPts3,g3);
      var srvKey3=svTeam3+srvP3;
      var prevSrv3=filt(cur.points,function(p){return p.game===g3&&p.srvPlayer===srvKey3;}).length;
      var rcvTeam3=svTeam3==='X'?'Y':'X';
      var rcvP3=prevSrv3%2===0?'A':'B';
      recordPt(rcvTeam3,rcvTeam3+rcvP3);
    }
    return;
  } else {
    G.rsn=val; // ''=通常, SM
  }
  buildSIG();
  updateSelStatus();
}

function buildSIG(){
  if(!cur)return;
  var el=document.getElementById('sig');el.innerHTML='';
  var lose=isLose(G.rsn);
  var rsnLabel=RSN_LABEL[G.rsn]||'通常';
  var subLabel='';
  if(isStr(G.rsn))subLabel=' ['+G.co+']';
  // rsn未選択（''）かつrsn-uiが表示中なら無効
  var rsnUiVisible=document.getElementById('rsn-ui').style.display!=='none';
  var needRsn=rsnUiVisible&&G.rsn==='';
  [['X',false,tnX(cur),cur.pXA,cur.pXB],['Y',true,tnY(cur),cur.pYA,cur.pYB]].forEach(function(a){
    var team=a[0],isY=a[1],tname=a[2],pA=a[3],pB=a[4];
    var box=document.createElement('div');box.className='tbox '+(isY?'yb':'xb');
    var ttl=document.createElement('div');ttl.className='ttl '+(isY?'y':'x');
    if(needRsn){
      ttl.textContent='⬆️ 理由を選んでください';
      ttl.style.color='#aa6600';ttl.style.fontSize='10px';
    } else {
      ttl.textContent=lose?'❌ '+tname+' ミス（押す）':'✅ '+tname+' 得点';
      if(lose)ttl.style.fontSize='9px';
    }
    box.appendChild(ttl);
    [[pA,team+'A'],[pB,team+'B']].forEach(function(pa){
      var btn=document.createElement('button');btn.className='pb2';
      if(needRsn){
        btn.disabled=true;
        btn.textContent=pa[0];
      } else if(lose){
        btn.style.cssText=isY?'background:#f8d0d0;border-color:#aa1111;color:#660000;':'background:#d0f8d0;border-color:#116611;color:#004400;';
        btn.textContent='❌ '+pa[0]+'がミス';
      } else {
        btn.style.cssText=isY?'background:#f8e0e0;border-color:#7a1a1a;color:#660000;':'background:#e0f8e0;border-color:#1a5a1a;color:#004400;';
        btn.textContent='○ '+pa[0]+' '+rsnLabel+subLabel;
      }
      (function(t,k){
        btn.addEventListener('click',function(e){
          e.preventDefault();e.stopPropagation();
          if(needRsn)return;
          recordPt(lose?(t==='X'?'Y':'X'):t,k);
        });
      })(team,pa[1]);
      box.appendChild(btn);
    });
    el.appendChild(box);
  });
}

function recordPt(winner,player){
  if(!cur||cur.done)return;
  var g=cur.curG,sv=getSrv(cur,g);
  if(cur.gX[g]==null)cur.gX[g]=0;
  if(cur.gY[g]==null)cur.gY[g]=0;
  var gIdx=(cur.gX[g]||0)+(cur.gY[g]||0);
  // ゲーム内ポイント数でサーバーを判定
  var gPtsNow=filt(cur.points,function(p){return p.game===g;}).length;
  var srvP=getSrvPlayer(cur,gPtsNow,g);
  // ファイナルゲームはサーブチームも動的に変わる
  var svActual=isFinalGame(cur,g)?getSrvTeamFinal(cur,gPtsNow):sv;
  var srvPlayer=svActual+srvP;
  // サーブコース：同一サーバーの本数で自動判定（偶数=正クロス、奇数=逆クロス）
  var prevSrvCount=filt(cur.points,function(p){return p.game===g&&p.srvPlayer===srvPlayer;}).length;
  var autoCo=prevSrvCount%2===0?'正クロス':'逆クロス';
  var pt={
    winner:winner,player:player,serve:sv,srvPlayer:srvPlayer,
    fX:fStr(G.fX),fY:fStr(G.fY),rsn:G.rsn,game:g,gIdx:gIdx,
    srv1:G.srv1,srv2:G.srv2,srvCo:autoCo,
    srvType:G.srv1===false?G.srvType2:G.srvType
  };
  if(isStr(G.rsn))pt.co=G.co;
  cur.points.push(pt);
  if(winner==='X')cur.gX[g]++;else cur.gY[g]++;
  var gx=cur.gX[g],gy=cur.gY[g],win=winN(cur),over=false;
  var fin=isFinalGame(cur,g);
  var goResult=isGameOver(gx,gy,fin);
  if(goResult){
    cur.gR[g]=goResult;
    if(goResult==='X')cur.totX++;else cur.totY++;
    over=true;
  }
  if(over){
    if(cur.totX>=win||cur.totY>=win)cur.done=true;
    else if(cur.curG<cur.mg-1)cur.curG++;
    else cur.done=true;
  }
  // 理由リセット
  G.rsn='';
  document.getElementById('miss-note').style.display='none';
  hideAllSub();
  clearRsBtn();
  updateSelStatus();buildSIG();renderSheet();updateStatus();persist();
  if(!cur.done)updateSrvUI();
  else{
    document.getElementById('srv-ui').style.display='none';
    document.getElementById('rsn-ui').style.display='none';
    document.getElementById('sig').style.display='none';
  }
}

function undo(){
  if(!cur||!cur.points.length)return;
  var last=cur.points.pop();
  cur.gX=[];cur.gY=[];cur.gR=[];cur.totX=0;cur.totY=0;cur.done=false;
  cur.points.forEach(function(p){
    if(cur.gX[p.game]==null)cur.gX[p.game]=0;
    if(cur.gY[p.game]==null)cur.gY[p.game]=0;
    if(p.winner==='X')cur.gX[p.game]++;else cur.gY[p.game]++;
  });
  for(var g=0;g<cur.mg;g++){
    var gx=cur.gX[g]||0,gy=cur.gY[g]||0;
    var ur=isGameOver(gx,gy,isFinalGame(cur,g));
    if(ur){cur.gR[g]=ur;if(ur==='X')cur.totX++;else cur.totY++;}
  }
  cur.curG=last.game;
  // undoでゲームが戻った場合、そのゲームのgFPは保持（最初のサーバーは変わらない）
  buildSIG();renderSheet();updateStatus();persist();
  if(!cur.done)updateSrvUI();
}

function pct(a,b){return(a+b)===0?0:Math.round(a/(a+b)*100);}
function filt(arr,fn){var r=[];for(var i=0;i<arr.length;i++)if(fn(arr[i]))r.push(arr[i]);return r;}
function cnt(pts,fn){return filt(pts,fn).length;}
function mkTbl(hs,rows){
  var s='<table class="stbl"><tr>'+hs.map(function(h){return'<th>'+h+'</th>';}).join('')+'</tr>';
  rows.forEach(function(r){s+='<tr>'+r.map(function(c){return'<td>'+c+'</td>';}).join('')+'</tr>';});
  return s+'</table>';
}
function bar(p){return'<div class="dbar"><div class="bx" style="width:'+p+'%;"></div><div class="by" style="width:'+(100-p)+'%;"></div></div>';}

function buildAnalysis(){
  var m=cur||(matches[0]||null),el=document.getElementById('an-out');
  if(!m||!m.points.length){el.innerHTML='<p class="empty">試合データがありません</p>';return;}
  var nx=tnX(m),ny=tnY(m),pts=m.points,tot=pts.length;
  var xW=cnt(pts,function(p){return p.winner==='X';}),yW=tot-xW;
  var html='<div class="antitle">📊 '+nx+' vs '+ny+'　'+m.mg+'Gマッチ</div>';
  var lx=nx+'（'+m.pXA+'・'+m.pXB+'）',ly=ny+'（'+m.pYA+'・'+m.pYB+'）';
  html+='<div class="ansec"><div class="ansh">① 試合サマリー</div><div style="display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 4px;border:1px solid #ccc;border-radius:3px;background:#fafafa;flex-wrap:wrap;"><span style="color:#004400;font-weight:bold;font-size:10px;">'+lx+'</span><span style="font-size:15px;font-weight:bold;color:#004400;">'+m.totX+'</span><span style="font-size:11px;color:#555;">-</span><span style="font-size:15px;font-weight:bold;color:#660000;">'+m.totY+'</span><span style="color:#660000;font-weight:bold;font-size:10px;">'+ly+'</span><span style="font-size:10px;font-weight:bold;background:#2a1a0a;color:#fff;padding:1px 6px;border-radius:2px;">'+(m.done?(m.totX>m.totY?lx+'勝':ly+'勝'):'進行中')+'</span></div></div>';
  var saX=filt(pts,function(p){return p.rsn==='SA'&&p.winner==='X';}),saY=filt(pts,function(p){return p.rsn==='SA'&&p.winner==='Y';});
  var strX=filt(pts,function(p){return isStr(p.rsn)&&p.winner==='X';}),strY=filt(pts,function(p){return isStr(p.rsn)&&p.winner==='Y';});
  var volX=filt(pts,function(p){return isVol(p.rsn)&&p.winner==='X';}),volY=filt(pts,function(p){return isVol(p.rsn)&&p.winner==='Y';});
  var smX=cnt(pts,function(p){return p.rsn==='SM'&&p.winner==='X';}),smY=cnt(pts,function(p){return p.rsn==='SM'&&p.winner==='Y';});
  var pls=[{k:'XA',n:m.pXA,t:'X',c:'#004400'},{k:'XB',n:m.pXB,t:'X',c:'#004400'},{k:'YA',n:m.pYA,t:'Y',c:'#660000'},{k:'YB',n:m.pYB,t:'Y',c:'#660000'}];

  // ===== ② 陣形別 =====
  html+='<div class="ansec"><div class="ansh">② 陣形別</div>';
  var fxKeys={},fyKeys={};
  pts.forEach(function(p){fxKeys[p.fX||'雁行']=1;fyKeys[p.fY||'雁行']=1;});
  var rowsF=[];
  Object.keys(fxKeys).forEach(function(fx){
    Object.keys(fyKeys).forEach(function(fy){
      var fp=filt(pts,function(p){return p.fX===fx&&p.fY===fy;});
      if(!fp.length)return;
      var fxw=cnt(fp,function(p){return p.winner==='X';}),fxr=pct(fxw,fp.length-fxw);
      rowsF.push(['<span style="background:#e0f0e0;border:1px solid #004400;padding:0 2px;font-size:7px;">'+fx+'</span>','<span style="background:#f0e0e0;border:1px solid #660000;padding:0 2px;font-size:7px;">'+fy+'</span>',fp.length+'回',fxr+'%',(100-fxr)+'%',bar(fxr)]);
    });

        var cutSA2=cnt(psrv,function(p){return p.srvType==='cut'&&p.rsn==='SA';});
        var cutRE2=cnt(pts,function(p){return p.srvPlayer===pl.k&&p.srvType==='cut'&&p.rsn==='RE';});
        var cutWin2=cnt(psrv,function(p){return p.srvType==='cut'&&p.winner===pl.t;});
        var cutWinR=cutC2?Math.round(cutWin2/cutC2*100):0;
        var normWin2=cnt(psrv,function(p){return p.srvType!=='cut'&&p.winner===pl.t;});
        var normWinR=normC2?Math.round(normWin2/normC2*100):0;
        srv_rows.push('<tr><td colspan="4" style="background:#fff8e0;font-weight:bold;font-size:9px;color:#7a5a00;">📊 カットサーブ分析</td></tr>');
        srv_rows.push('<tr><td>カットサーブ数</td><td style="text-align:center;"><b>'+cutC2+'本</b></td><td style="text-align:center;">'+(psrv.length?Math.round(cutC2/psrv.length*100)+'%':'-')+'</td><td>'+bar(psrv.length?Math.round(cutC2/psrv.length*100):0)+'</td></tr>');
        srv_rows.push('<tr><td>カット時得点率</td><td style="text-align:center;"><b>'+cutWin2+'/'+cutC2+'</b></td><td style="text-align:center;">'+cutWinR+'%</td><td>'+bar(cutWinR)+'</td></tr>');
        srv_rows.push('<tr><td>通常時得点率</td><td style="text-align:center;"><b>'+normWin2+'/'+normC2+'</b></td><td style="text-align:center;">'+normWinR+'%</td><td>'+bar(normWinR)+'</td></tr>');
        srv_rows.push('<tr><td>カットSA</td><td style="text-align:center;"><b>'+cutSA2+'本</b></td><td style="text-align:center;">'+(cutC2?Math.round(cutSA2/cutC2*100)+'%':'-')+'</td><td>'+bar(cutC2?Math.round(cutSA2/cutC2*100):0)+'</td></tr>');
        srv_rows.push('<tr><td>カット時RE(相手)</td><td style="text-align:center;"><b>'+cutRE2+'本</b></td><td style="text-align:center;">'+(cutC2?Math.round(cutRE2/cutC2*100)+'%':'-')+'</td><td>'+bar(cutC2?Math.round(cutRE2/cutC2*100):0)+'</td></tr>');
      }


      html+='<table class="stbl" style="margin-bottom:5px;"><tr><th>項目</th><th>本数</th><th>率</th><th>グラフ</th></tr>'+srv_rows.join('')+'</table>';
    }
    // ── 総評バッジ ──
    var badges=[];
    if(pwin.length>=5)badges.push('<span style="background:#1a5a1a;color:#fff;font-size:8px;padding:1px 5px;border-radius:3px;">得点力◎</span>');
    var missR=pwin.length+missTotal>0?Math.round(missTotal/(pwin.length+missTotal)*100):0;
    if(missR<20)badges.push('<span style="background:#1a6a9a;color:#fff;font-size:8px;padding:1px 5px;border-radius:3px;">安定感◎</span>');
    if(missR>40)badges.push('<span style="background:#cc4400;color:#fff;font-size:8px;padding:1px 5px;border-radius:3px;">ミス改善要</span>');
    var saR=psrv.length?Math.round(cnt(psrv,function(p){return p.rsn==='SA';})/psrv.length*100):0;
    if(saR>=20)badges.push('<span style="background:#cc9900;color:#fff;font-size:8px;padding:1px 5px;border-radius:3px;">サーブ威力◎</span>');
    if(badges.length)html+='<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;">'+badges.join('')+'</div>';
    html+='</div>';
  });
  html+='</div>';
  // メモを分析に表示
if(m.memos&&m.memos.length){
  html+='<div class="ansec"><div class="ansh">⑫ 📝 メモ一覧</div><div style="border:1px solid #ddd;border-radius:4px;background:#f8fbff;padding:6px;">';
  m.memos.slice().reverse().forEach(function(memo){
    var tagHtml=memo.text.replace(/(⚡得点|❌ミス|🎾サーブ|🏃陣形|💡気づき|⚠️課題)/g,'<span style="background:#e8f0fa;color:#3a5a8a;border-radius:3px;padding:0 2px;font-size:8px;font-weight:bold;">$1</span>');
    html+='<div style="border-bottom:1px solid #eee;padding:5px 4px;"><div style="font-size:8px;color:#aaa;margin-bottom:2px;">'+memo.ts+(memo.gInfo?' ｜ '+memo.gInfo:'')+'</div><div style="font-size:10px;color:#333;white-space:pre-wrap;line-height:1.6;">'+tagHtml+'</div></div>';
  });
  html+='</div></div>';
  html+='<div class="ansec"><div class="ansh">⑬ 🤖 AI分析レポート</div>';
} else {
  html+='<div class="ansec"><div class="ansh">⑫ 🤖 AI分析レポート</div>';
}
html+='<div id="ai-out"><button onclick="runAI()" style="width:100%;padding:10px;background:#2a1a0a;color:#fff;font-size:12px;border-radius:3px;border:none;cursor:pointer;">🤖 AIに試合を分析してもらう</button></div></div>';

function runAI(){
  if(!cur||!cur.points.length)return;
  var el=document.getElementById('ai-out');
  el.innerHTML='<div style="text-align:center;padding:12px;color:#888;font-size:11px;">⏳ 作戦メモを生成中...</div>';
  var m=cur,nx=tnX(m),ny=tnY(m),pts=m.points;
  function c(fn){return filt(pts,fn).length;}
  var total=pts.length;
  var xW=c(function(p){return p.winner==='X';}),yW=total-xW;
  var plDefs=[{k:'XA',n:m.pXA,t:'X'},{k:'XB',n:m.pXB,t:'X'},{k:'YA',n:m.pYA,t:'Y'},{k:'YB',n:m.pYB,t:'Y'}];

  // データ集計
  var stats={};
  plDefs.forEach(function(pl){
    var sp=filt(pts,function(p){return p.srvPlayer===pl.k;});
    var cutSp=filt(sp,function(p){return p.srvType==='cut';});
    var rcvAB=pl.k.charAt(1);
    var cutRcv=filt(pts,function(p){
      if(p.serve===pl.t)return false;
      if(p.srvType!=='cut')return false;
      return (p.srvCo==='正クロス'?'A':'B')===rcvAB;
    });
    var normRcv=filt(pts,function(p){
      if(p.serve===pl.t)return false;
      if(p.srvType==='cut')return false;
      return (p.srvCo==='正クロス'?'A':'B')===rcvAB;
    });
    stats[pl.k]={
      win:c(function(p){return p.player===pl.k&&p.winner===pl.t;}),
      sa:c(function(p){return p.rsn==='SA'&&p.srvPlayer===pl.k;}),
      df:c(function(p){return p.rsn==='DF'&&p.srvPlayer===pl.k;}),
      re:c(function(p){return p.rsn==='RE'&&p.winner!==pl.t&&p.player===pl.k;}),
      ue:c(function(p){return p.rsn==='UE'&&p.winner!==pl.t&&p.player===pl.k;}),
      bve:c(function(p){return p.rsn==='BVE'&&p.winner!==pl.t&&p.player===pl.k;}),
      sme:c(function(p){return p.rsn==='SME'&&p.winner!==pl.t&&p.player===pl.k;}),
      vol:c(function(p){return isVol(p.rsn)&&p.winner===pl.t&&p.player===pl.k;}),
      sm:c(function(p){return p.rsn==='SM'&&p.winner===pl.t&&p.player===pl.k;}),
      srvTotal:sp.length,
      cutTotal:cutSp.length,
      cutWinR:cutSp.length?Math.round(c(function(p){return p.srvType==='cut'&&p.srvPlayer===pl.k&&p.winner===pl.t;})/cutSp.length*100):null,
      cutRcvRE:cnt(cutRcv,function(p){return p.rsn==='RE';}),
      cutRcvWinR:cutRcv.length?Math.round(cnt(cutRcv,function(p){return p.winner===pl.t;})/cutRcv.length*100):null,
      normRcvWinR:normRcv.length?Math.round(cnt(normRcv,function(p){return p.winner===pl.t;})/normRcv.length*100):null,
      f1in:filt(sp,function(p){return p.srv1===true;}).length,
      f1tot:filt(sp,function(p){return p.srv1!=null;}).length,
    };
  });

  // ===== 作戦メモ生成 =====
  var sections=[];

  // ① 試合結果
  var r1='<div style="background:#2a1a0a;color:#ffe;padding:6px 10px;border-radius:3px;font-size:11px;font-weight:bold;margin-bottom:8px;">';
  r1+='🎾 '+nx+' '+m.totX+' - '+m.totY+' '+ny;
  r1+=(m.done?' （'+(m.totX>m.totY?nx+'勝利':ny+'勝利')+'）':' 進行中')+'</div>';
  sections.push(r1);

  // ② 自チーム（X）の強み・課題
  var xAdvantages=[],xIssues=[];
  ['XA','XB'].forEach(function(k){
    var s=stats[k],n=k==='XA'?m.pXA:m.pXB,pos=k==='XA'?'後衛':'前衛';
    if(s.sa>=2) xAdvantages.push(n+'（'+pos+'）のSAが'+s.sa+'本と効果的');
    if(s.vol>=2) xAdvantages.push(n+'（'+pos+'）のボレーが'+s.vol+'本');
    if(s.sm>=2) xAdvantages.push(n+'（'+pos+'）のスマッシュが'+s.sm+'本');
    if(s.cutTotal>0&&s.cutWinR>=60) xAdvantages.push(n+'のカットサーブ得点率'+s.cutWinR+'%と高い');
    if(s.f1tot>0&&Math.round(s.f1in/s.f1tot*100)>=65) xAdvantages.push(n+'の1stサーブ確率'+Math.round(s.f1in/s.f1tot*100)+'%と安定');
    if(s.df>=2) xIssues.push(n+'（'+pos+'）のDF '+s.df+'本を減らす');
    if(s.re>=2) xIssues.push(n+'（'+pos+'）のREが'+s.re+'本、レシーブを安定させる');
    if(s.ue>=2) xIssues.push(n+'（'+pos+'）の凡ミス'+s.ue+'本を改善');
    if(s.bve>=2) xIssues.push(n+'（'+pos+'）のボレーミス'+s.bve+'本を減らす');
    if(s.cutRcvWinR!==null&&s.cutRcvWinR<40) xIssues.push(n+'（'+pos+'）のカットサーブ対応が苦手（得点率'+s.cutRcvWinR+'%）');
  });
  var r2='<div style="border:1px solid #1a5a1a;border-radius:4px;padding:8px;margin-bottom:6px;">';
  r2+='<div style="font-size:10px;font-weight:bold;color:#004400;margin-bottom:5px;">✅ '+nx+' の強み</div>';
  if(xAdvantages.length){xAdvantages.forEach(function(a){r2+='<div style="font-size:10px;color:#004400;margin-bottom:2px;">▶ '+a+'</div>';});}
  else r2+='<div style="font-size:10px;color:#aaa;">データ不足</div>';
  r2+='<div style="font-size:10px;font-weight:bold;color:#8a1a1a;margin:6px 0 4px;">⚠️ '+nx+' の課題</div>';
  if(xIssues.length){xIssues.forEach(function(a){r2+='<div style="font-size:10px;color:#8a1a1a;margin-bottom:2px;">▶ '+a+'</div>';});}
  else r2+='<div style="font-size:10px;color:#aaa;">目立った課題なし</div>';
  r2+='</div>';
  sections.push(r2);

  // ③ 相手（Y）の弱点・対策
  var yWeaks=[],yTactics=[];
  ['YA','YB'].forEach(function(k){
    var s=stats[k],n=k==='YA'?m.pYA:m.pYB,pos=k==='YA'?'後衛':'前衛';
    if(s.df>=2) yWeaks.push(n+'（'+pos+'）はDFが'+s.df+'本、プレッシャーをかけると崩れやすい');
    if(s.re>=2) yWeaks.push(n+'（'+pos+'）はREが'+s.re+'本、レシーブが不安定');
    if(s.ue>=2) yWeaks.push(n+'（'+pos+'）は凡ミス'+s.ue+'本と自滅しやすい');
    if(s.bve>=2) yWeaks.push(n+'（'+pos+'）はボレーミス'+s.bve+'本、ネット際を攻める');
    if(s.cutRcvWinR!==null&&s.cutRcvWinR<40) yWeaks.push(n+'（'+pos+'）はカットサーブが苦手（得点率'+s.cutRcvWinR+'%）');
    if(s.cutRcvRE>=2) yTactics.push(n+'へのカットサーブが有効（RE '+s.cutRcvRE+'本）');
    if(s.f1tot>0&&Math.round(s.f1in/s.f1tot*100)<50) yWeaks.push(n+'の1stサーブ確率が低い（'+Math.round(s.f1in/s.f1tot*100)+'%）、積極的にレシーブ攻撃');
  });
  var r3='<div style="border:1px solid #7a1a1a;border-radius:4px;padding:8px;margin-bottom:6px;">';
  r3+='<div style="font-size:10px;font-weight:bold;color:#660000;margin-bottom:5px;">🎯 '+ny+' の弱点</div>';
  if(yWeaks.length){yWeaks.forEach(function(a){r3+='<div style="font-size:10px;color:#660000;margin-bottom:2px;">▶ '+a+'</div>';});}
  else r3+='<div style="font-size:10px;color:#aaa;">目立った弱点は検出されず</div>';
  if(yTactics.length){
    r3+='<div style="font-size:10px;font-weight:bold;color:#7a5a00;margin:6px 0 4px;">💡 有効な攻め方</div>';
    yTactics.forEach(function(a){r3+='<div style="font-size:10px;color:#7a5a00;margin-bottom:2px;">▶ '+a+'</div>';});
  }
  r3+='</div>';
  sections.push(r3);

  // ④ 次の試合への箇条書き作戦メモ
  var tactics=[];
  // カットサーブ弱い相手がいれば
  ['YA','YB'].forEach(function(k){
    var s=stats[k],n=k==='YA'?m.pYA:m.pYB;
    if(s.cutRcvWinR!==null&&s.cutRcvWinR<40) tactics.push('📌 '+n+'へのカットサーブを積極的に使う（得点率'+s.cutRcvWinR+'%）');
  });
  // ランが発生した場面
  var maxRunX=0,maxRunY=0,runTeam=pts[0].winner,runLen=1;
  for(var ri=1;ri<pts.length;ri++){
    if(pts[ri].winner===runTeam){runLen++;}
    else{if(runTeam==='X'&&runLen>maxRunX)maxRunX=runLen;if(runTeam==='Y'&&runLen>maxRunY)maxRunY=runLen;runTeam=pts[ri].winner;runLen=1;}
  }
  if(runTeam==='X'&&runLen>maxRunX)maxRunX=runLen;
  if(runTeam==='Y'&&runLen>maxRunY)maxRunY=runLen;
  if(maxRunX>=4) tactics.push('📌 '+nx+'は'+maxRunX+'連続得点の場面あり → その陣形・パターンを再現する');
  if(maxRunY>=4) tactics.push('📌 '+ny+'に'+maxRunY+'連続得点された → その局面の対策を練る');
  // サーブ
  var dfXtot=c(function(p){return p.rsn==='DF'&&p.serve==='X';}),dfYtot=c(function(p){return p.rsn==='DF'&&p.serve==='Y';});
  if(dfXtot>=3) tactics.push('📌 DFが'+dfXtot+'本 → セカンドサーブの精度を上げる練習が必要');
  if(dfYtot>=3) tactics.push('📌 相手DFが'+dfYtot+'本 → プレッシャーをかければ相手は崩れやすい');
  // ボレー
  var volX=c(function(p){return isVol(p.rsn)&&p.winner==='X';});
  var volY=c(function(p){return isVol(p.rsn)&&p.winner==='Y';});
  if(volY>volX&&total>10) tactics.push('📌 相手のボレー得点('+volY+'本)が多い → ロブを有効活用する');
  if(volX>2) tactics.push('📌 自チームのボレー得点('+volX+'本)が効果的 → 積極的なネットプレーを続ける');

  var r4='<div style="border:1px solid #3a5a8a;border-radius:4px;padding:8px;margin-bottom:6px;">';
  r4+='<div style="font-size:10px;font-weight:bold;color:#3a5a8a;margin-bottom:5px;">📋 次の試合への作戦メモ</div>';
  if(tactics.length){tactics.forEach(function(a){r4+='<div style="font-size:10px;color:#333;margin-bottom:4px;padding:3px 0;border-bottom:1px dotted #ddd;">'+a+'</div>';});}
  else r4+='<div style="font-size:10px;color:#aaa;">データが少なく作戦メモを生成できませんでした</div>';
  r4+='</div>';
  sections.push(r4);

  el.innerHTML=sections.join('');
}


function buildHistory(){
  var el=document.getElementById('hist-out');el.innerHTML='';
  if(!matches.length){el.innerHTML='<div class="empty">履歴なし</div>';return;}
  // フォルダグループ化
  var groups={}; // folderId→[]
  var ORDER=[];
  matches.forEach(function(m){
    var fid=m.folderId||'__none__';
    if(!groups[fid]){groups[fid]=[];ORDER.push(fid);}
    groups[fid].push(m);
  });
  // 重複除去
  var seen={};ORDER=ORDER.filter(function(x){if(seen[x])return false;seen[x]=true;return true;});
  ORDER.forEach(function(fid){
    var ms=groups[fid];
    var fname='未分類';
    if(fid!=='__none__'){
      var f=filt(folders,function(x){return String(x.id)===String(fid);})[0];
      if(f)fname=f.name;
    }
    var wrap=document.createElement('div');wrap.className='folder-group';
    // ヘッダー
    var hd=document.createElement('div');hd.className='folder-hd';
    hd.innerHTML='<span class="ficon">📁</span><span class="fname">'+fname+'</span><span class="fcnt">'+ms.length+'試合</span>';
    var body=document.createElement('div');body.className='folder-body open';
    // フォルダヘッダークリックで折りたたみ
    hd.onclick=function(){body.classList.toggle('open');};
    // フォルダ削除ボタン（未分類は削除不可）
    if(fid!=='__none__'){
      var delBtn=document.createElement('button');delBtn.className='folder-del no-print';delBtn.textContent='削除';
      (function(foldId){
        delBtn.onclick=function(e){
          e.stopPropagation();
          if(!confirm('フォルダ「'+fname+'」を削除しますか？（試合は未分類に移動します）'))return;
          folders=filt(folders,function(x){return String(x.id)!==String(foldId);});
          matches.forEach(function(m){if(String(m.folderId)===String(foldId))m.folderId=null;});
          persist();buildHistory();
        };
      })(fid);
      hd.appendChild(delBtn);
    }
    wrap.appendChild(hd);
    ms.forEach(function(m){
      var nx=tnX(m),ny=tnY(m);
      var card=document.createElement('div');card.className='hcard';
      var info=document.createElement('div');info.className='hcard-info';
      info.innerHTML='<h4>'+m.tournament+' <span class="badge">'+m.totX+'-'+m.totY+'</span> '+(m.done?(m.totX>m.totY?'<span style="color:#004400;">'+nx+'勝</span>':'<span style="color:#660000;">'+ny+'勝</span>'):'進行中')+'</h4><p>'+m.date+' | '+nx+' vs '+ny+' | '+m.court+'番コート | '+m.points.length+'pt</p>';
      // 試合削除ボタン
      var mDel=document.createElement('button');mDel.className='hcard-del no-print';mDel.textContent='✕';
      (function(mm){
        mDel.onclick=function(e){
          e.stopPropagation();
          if(!confirm('この試合を削除しますか？'))return;
          matches=filt(matches,function(x){return x.id!==mm.id;});
          if(cur&&cur.id===mm.id)cur=matches[0]||null;
          persist();buildHistory();
          if(cur)showMatchUI();else{
            document.getElementById('no-msg').style.display='block';
            document.getElementById('sheet-wrap').style.display='none';
            document.getElementById('status').style.display='none';
            document.getElementById('input-wrap').style.display='none';
          }
        };
        info.onclick=function(){cur=mm;showMatchUI();showTab('record');};
      })(m);
      card.appendChild(info);card.appendChild(mDel);
      body.appendChild(card);
    });
    wrap.appendChild(body);el.appendChild(wrap);
  });
}

function insertTag(tag){

  var v=ta.value;

function addMemoEntry(){
  var ta=document.getElementById('memo-txt');
  var text=(ta.value||'').trim();
  if(!text)return;
  if(!cur.memos)cur.memos=[];
  var now=new Date();
  var ts=now.getFullYear()+'/'+(now.getMonth()+1)+'/'+(('0'+now.getDate()).slice(-2))+' '+(('0'+now.getHours()).slice(-2))+':'+(('0'+now.getMinutes()).slice(-2));
  // 現在のゲーム情報も添付
  var gInfo=cur.curG!=null?'G'+(cur.curG+1)+' '+tnX(cur)+':'+(cur.gX[cur.curG]||0)+'-'+tnY(cur)+':'+(cur.gY[cur.curG]||0):'';
  cur.memos.push({id:Date.now(),ts:ts,gInfo:gInfo,text:text});
  ta.value='';
  persist();
  renderMemoList();
}
function deleteMemoEntry(id){
  if(!cur||!cur.memos)return;
  cur.memos=filt(cur.memos,function(m){return m.id!==id;});
  persist();renderMemoList();
}
function renderMemoList(){
  var el=document.getElementById('memo-list');
  if(!cur||!cur.memos||!cur.memos.length){
    el.innerHTML='<div style="text-align:center;padding:16px;color:#aaa;font-size:10px;">メモはまだありません</div>';
    return;
  }
  // 新しい順
  var list=cur.memos.slice().reverse();
  el.innerHTML='';
  list.forEach(function(m){
    var d=document.createElement('div');d.className='memo-entry';
    var tagHtml=m.text.replace(/(⚡得点|❌ミス|🎾サーブ|🏃陣形|💡気づき|⚠️課題)/g,'<span style="background:#e8f0fa;color:#3a5a8a;border-radius:3px;padding:0 3px;font-size:10px;font-weight:bold;">$1</span>');
    d.innerHTML='<div class="me-time">'+m.ts+(m.gInfo?' ｜ '+m.gInfo:'')+'</div><div class="me-text">'+tagHtml+'</div>';
    var del=document.createElement('button');del.className='me-del';del.textContent='✕';
    (function(mid){del.onclick=function(){deleteMemoEntry(mid);};})(m.id);
    d.appendChild(del);el.appendChild(d);
  });
}

// 初期化
setMG(5);
if(matches.length){cur=matches[0];showMatchUI();}
</script>
